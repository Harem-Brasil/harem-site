name: BDD Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/bdd-tests.yml'
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/bdd-tests.yml'

jobs:
  bdd-tests:
    name: Godog BDD Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/harem_test?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-at-least-32-characters-long

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run database migrations
        run: |
          psql "$DATABASE_URL" -f migrations/001_initial_schema.sql

      - name: Lint
        run: make lint

      - name: Run unit tests
        run: go test -v -race ./...

      - name: Run BDD tests
        run: make bdd

      - name: Upload BDD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-report
          path: backend/bdd-report.json
          retention-days: 7

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api"
  args_bin = ["serve"]
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules", "features"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml", "yaml", "sql"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true

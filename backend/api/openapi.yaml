openapi: 3.1.0
info:
  title: Harém Brasil API
  version: 1.0.0
  description: API backend para a plataforma Harém Brasil

servers:
  - url: http://localhost:40080
    description: Desenvolvimento local

paths:
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Autenticar usuário com email e senha
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              valid:
                summary: Credenciais válidas
                value:
                  email: user@example.com
                  password: SecurePass123!
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Credenciais inválidas
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campos obrigatórios ou formato inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email do usuário
          examples:
            - user@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: Senha do usuário
      additionalProperties: false

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT de acesso (expira em 15 minutos)
        refresh_token:
          type: string
          description: Token de renovação (expira em 7 dias)
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
          description: Timestamp de expiração do access token
        user:
          $ref: "#/components/schemas/UserPublic"
      required: [access_token, refresh_token, token_type, expires_at, user]

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, creator, admin]
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, username, role, created_at]

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required: [title, status]

    ValidationError:
      allOf:
        - $ref: "#/components/schemas/ProblemDetail"
        - type: object
          properties:
            extensions:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string

openapi: 3.1.0
info:
  title: Harém Brasil API
  version: 1.0.0
  description: API backend para a plataforma Harém Brasil

servers:
  - url: http://localhost:40080
    description: Desenvolvimento local

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Registar novo usuário
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              valid:
                summary: Registo válido
                value:
                  email: user@example.com
                  screen_name: cooluser
                  password: SecurePass123!
                  accept_terms_version: "1.0"
      responses:
        "201":
          description: Utilizador criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Email ou screen_name já existe
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campos obrigatórios ou formato inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Autenticar usuário com email e senha
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              valid:
                summary: Credenciais válidas
                value:
                  email: user@example.com
                  password: SecurePass123!
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Credenciais inválidas
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campos obrigatórios ou formato inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Renovar par de tokens via refresh token opaco
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens renovados com sucesso (rotação: token anterior invalidado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Refresh token inválido, expirado ou revogado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revogar sessão corrente (refresh token)
      description: Requer autenticação JWT. Idempotente — 204 mesmo se token já revogado ou inexistente.
      tags: [Autenticação]
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Sessão revogada com sucesso (ou já estava revogada)
        "401":
          description: JWT ausente ou inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      summary: Revogar todas as sessões do utilizador
      description: Requer autenticação JWT. Idempotente — 204 mesmo sem sessões ativas.
      tags: [Autenticação]
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Todas as sessões revogadas com sucesso
        "401":
          description: JWT ausente ou inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, screen_name, password, accept_terms_version]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email do usuário
          examples:
            - user@example.com
        screen_name:
          type: string
          minLength: 2
          maxLength: 64
          description: Nome de exibição do usuário
          examples:
            - cooluser
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[\\p{P}\\p{S}]).{8,}$"
          description: Senha do usuário (mínimo 8 caracteres, 1 maiúscula, 1 minúscula, 1 dígito, 1 especial)
        accept_terms_version:
          type: string
          maxLength: 32
          description: Versão dos termos aceites pelo usuário
          examples:
            - "1.0"
      additionalProperties: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email do usuário
          examples:
            - user@example.com
        password:
          type: string
          format: password
          maxLength: 128
          description: Senha do usuário
      additionalProperties: false

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT de acesso (expira em 15 minutos)
        access_expires_in:
          type: integer
          description: Duração do access token em segundos
          examples:
            - 900
        refresh_token:
          type: string
          description: Token de renovação (expira em 7 dias)
        refresh_expires_in:
          type: integer
          description: Duração do refresh token em segundos
          examples:
            - 604800
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
          description: Timestamp de expiração do access token
        user:
          $ref: "#/components/schemas/UserPublic"
      required: [access_token, access_expires_in, refresh_token, refresh_expires_in, token_type, expires_at, user]

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        screen_name:
          type: string
          description: Nome de exibição do usuário
        email:
          type: string
          format: email
        role:
          type: string
          enum: [guest, user, creator, moderator, admin]
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, screen_name, role, created_at]

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required: [title, status]

    ValidationError:
      allOf:
        - $ref: "#/components/schemas/ProblemDetail"
        - type: object
          properties:
            extensions:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Token de renovação opaco recebido no login/registro/refresh anterior
      additionalProperties: false

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Token de renovação a revogar (opcional — se omitido, não revoga nenhum refresh token)
      additionalProperties: false

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
